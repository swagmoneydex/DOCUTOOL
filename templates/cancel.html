<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Cancelled</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 bg-white p-5 rounded shadow text-center">
            <h2 class="fw-bold mb-3">Checkout cancelled</h2>
            <p class="text-muted">Your account was not created and no subscription was started.</p>
            <a href="/register" class="btn btn-primary">Try again</a>
        </div>
    </div>
</div>

</body>
</html>
