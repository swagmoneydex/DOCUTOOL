    <title>Checkout Cancelled – DocuTool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            padding: 18px 60px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-logo { font-size: 22px; font-weight: 800; color: white; text-decoration: none; }
        .nav-logo span { color: #818cf8; }
        .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 60px 20px; }
        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 56px 44px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }
        .icon { font-size: 56px; margin-bottom: 20px; display: block; }
        h2 { font-size: 26px; font-weight: 800; color: #1a1a2e; margin-bottom: 10px; letter-spacing: -0.5px; }
        p { font-size: 15px; color: #64748b; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #4F46E5;
            color: white;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(79,70,229,0.3);
        }
        .btn:hover { background: #4338CA; transform: translateY(-1px); }
        .secondary { display: block; margin-top: 16px; color: #94a3b8; font-size: 14px; text-decoration: none; }
        .secondary:hover { color: #4F46E5; }
    </style>
</head>

    <nav><a href="/" class="nav-logo">Docu<span>Tool</span></a></nav>
    <div class="page">
        <div class="card">
            <span class="icon">↩️</span>
            <h2>Checkout cancelled</h2>
            <p>No worries — you haven't been charged. Head back and try again whenever you're ready.</p>
            <a href="/register" class="btn">Try again →</a>
            <a href="/" class="secondary">Return to homepage</a>
        </div>
    </div>
