<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="zxGrvg0PrIqD9NZGX7JefP84SJI4XLaHKHehk4Ok-Lk" />

    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18000144047"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'AW-18000144047');

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In – DocuTool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        nav {
            padding: 18px 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-logo { font-size: 22px; font-weight: 800; color: white; text-decoration: none; }
        .nav-logo span { color: #818cf8; }
        .nav-link { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; }
        .nav-link:hover { color: white; }
        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }
        .card h2 { font-size: 26px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; letter-spacing: -0.5px; }
        .card p.subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus { border-color: #4F46E5; }
        .btn {
            width: 100%;
            padding: 14px;
            background: #4F46E5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 6px 20px rgba(79,70,229,0.35);
        }
        .btn:hover { background: #4338CA; transform: translateY(-1px); }
        .signup-link { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .signup-link a { color: #4F46E5; font-weight: 600; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
        .flash { background: #fee2e2; color: #991b1b; padding: 10px 14px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .divider { height: 1px; background: #f1f5f9; margin: 4px 0 20px; }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-logo">Docu<span>Tool</span></a>
        <a href="/register" class="nav-link">No account? Sign up →</a>
    </nav>
    <div class="page">
        <div class="card">
            <h2>Welcome back</h2>
            <p class="subtitle">Log in to your DocuTool account.</p>
            <div class="divider"></div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <label>Email address</label>
                <input type="email" name="email" placeholder="you@example.com" required>

                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>

                <button type="submit" class="btn">Log in →</button>
            </form>

            <p class="signup-link">Don't have an account? <a href="/register">Start free trial</a></p>
        </div>
    </div>
</body>
</html>
